<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="960" height="720" fill="#fff"/>

  <!-- ══════════ START ══════════ -->
  <ellipse cx="480" cy="42" rx="60" ry="22" fill="#333" stroke="#333" stroke-width="1"/>
  <text x="480" y="48" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">START</text>

  <line x1="480" y1="64" x2="480" y2="92" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ══════════ MOISTURE READ ══════════ -->
  <rect x="320" y="96" width="320" height="56" rx="10" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1.2"/>
  <text x="480" y="120" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">Read sponge moisture (RCTIME)</text>
  <text x="480" y="138" text-anchor="middle" fill="#4A78A5" font-size="11">capacitive sensor on pin 9</text>

  <line x1="480" y1="152" x2="480" y2="184" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ══════════ MOISTURE DECISION ══════════ -->
  <polygon points="480,188 640,232 480,276 320,232" fill="#FFF8E1" stroke="#D9A40A" stroke-width="1.2"/>
  <text x="480" y="226" text-anchor="middle" fill="#5C4400" font-size="13" font-weight="600">RCTIME &gt; 11600 ?</text>
  <text x="480" y="244" text-anchor="middle" fill="#7A5E00" font-size="11">(sponge dry?)</text>

  <!-- YES branch (left) -->
  <line x1="320" y1="232" x2="200" y2="232" stroke="#333" stroke-width="1.4"/>
  <text x="260" y="222" text-anchor="middle" fill="#666" font-size="11" font-weight="600">YES</text>
  <line x1="200" y1="232" x2="200" y2="296" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="60" y="300" width="280" height="80" rx="10" fill="#FFF0E8" stroke="#D85A30" stroke-width="1.2"/>
  <text x="200" y="324" text-anchor="middle" fill="#712B13" font-size="13" font-weight="600">DRY CLEAN MODE</text>
  <text x="200" y="344" text-anchor="middle" fill="#A86040" font-size="11">pump OFF · LCD: "PLEASE FILL"</text>
  <text x="200" y="362" text-anchor="middle" fill="#A86040" font-size="11">rear servo idle · front sweeper ON</text>

  <!-- NO branch (right) -->
  <line x1="640" y1="232" x2="760" y2="232" stroke="#333" stroke-width="1.4"/>
  <text x="700" y="222" text-anchor="middle" fill="#666" font-size="11" font-weight="600">NO</text>
  <line x1="760" y1="232" x2="760" y2="296" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="620" y="300" width="280" height="80" rx="10" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="760" y="324" text-anchor="middle" fill="#085041" font-size="13" font-weight="600">WET CLEAN MODE</text>
  <text x="760" y="344" text-anchor="middle" fill="#3A8A6E" font-size="11">pump ON · LCD: "TANK FULL"</text>
  <text x="760" y="362" text-anchor="middle" fill="#3A8A6E" font-size="11">rear mop sweep 0°↔180°</text>

  <!-- merge -->
  <line x1="200" y1="380" x2="200" y2="412" stroke="#333" stroke-width="1.4"/>
  <line x1="760" y1="380" x2="760" y2="412" stroke="#333" stroke-width="1.4"/>
  <line x1="200" y1="412" x2="760" y2="412" stroke="#333" stroke-width="1.4"/>
  <line x1="480" y1="412" x2="480" y2="448" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ══════════ ULTRASONIC READ ══════════ -->
  <rect x="320" y="452" width="320" height="56" rx="10" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1.2"/>
  <text x="480" y="476" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">Ultrasonic ranging (HC-SR04)</text>
  <text x="480" y="494" text-anchor="middle" fill="#4A78A5" font-size="11">PULSOUT trigger → PULSIN echo → cm</text>

  <line x1="480" y1="508" x2="480" y2="536" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ══════════ DISTANCE DECISION ══════════ -->
  <polygon points="480,540 640,580 480,620 320,580" fill="#FFF8E1" stroke="#D9A40A" stroke-width="1.2"/>
  <text x="480" y="576" text-anchor="middle" fill="#5C4400" font-size="13" font-weight="600">distance ≤ 50 cm ?</text>
  <text x="480" y="594" text-anchor="middle" fill="#7A5E00" font-size="11">(obstacle?)</text>

  <!-- YES → turn right -->
  <line x1="320" y1="580" x2="180" y2="580" stroke="#333" stroke-width="1.4"/>
  <text x="250" y="570" text-anchor="middle" fill="#666" font-size="11" font-weight="600">YES</text>
  <line x1="180" y1="580" x2="180" y2="636" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="60" y="640" width="240" height="56" rx="10" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1.2"/>
  <text x="180" y="664" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">TURN RIGHT</text>
  <text x="180" y="682" text-anchor="middle" fill="#7A6BA0" font-size="11">left fwd · right rev (in-place)</text>

  <!-- NO → forward -->
  <line x1="640" y1="580" x2="780" y2="580" stroke="#333" stroke-width="1.4"/>
  <text x="710" y="570" text-anchor="middle" fill="#666" font-size="11" font-weight="600">NO</text>
  <line x1="780" y1="580" x2="780" y2="636" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="660" y="640" width="240" height="56" rx="10" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1.2"/>
  <text x="780" y="664" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">MOVE FORWARD</text>
  <text x="780" y="682" text-anchor="middle" fill="#7A6BA0" font-size="11">both sides PWM forward</text>

  <!-- loop arrow back to top -->
  <path d="M180,640 L180,412 L40,412 L40,42 L420,42" fill="none" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="46" y="226" fill="#999" font-size="11" transform="rotate(-90 46 226)">loop forever</text>

  <!-- ══════════ LEGEND ══════════ -->
  <g transform="translate(620,40)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#EBF5FF" stroke="#4A90D9" stroke-width="0.8"/>
    <text x="20" y="11" fill="#666" font-size="10">Sense</text>
    <rect x="80" y="0" width="14" height="14" rx="3" fill="#FFF8E1" stroke="#D9A40A" stroke-width="0.8"/>
    <text x="100" y="11" fill="#666" font-size="10">Decide</text>
    <rect x="170" y="0" width="14" height="14" rx="3" fill="#E6F7F0" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="190" y="11" fill="#666" font-size="10">Wet mode</text>
    <rect x="260" y="0" width="14" height="14" rx="3" fill="#FFF0E8" stroke="#D85A30" stroke-width="0.8"/>
    <text x="280" y="11" fill="#666" font-size="10">Dry mode</text>
    <rect x="80" y="20" width="14" height="14" rx="3" fill="#F3EEFE" stroke="#8B72BE" stroke-width="0.8"/>
    <text x="100" y="31" fill="#666" font-size="10">Drive action</text>
  </g>
</svg>
